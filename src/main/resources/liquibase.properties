# =============================================================================
# Liquibase Secure 5.1.1 — liquibase.properties
# Secrets are resolved at runtime from AWS Secrets Manager.
# Syntax: aws-secrets,<secret-name>,<secret-key>
#
# Before running, ensure your AWS credentials are configured via one of:
#   - ~/.aws/credentials  +  ~/.aws/config  (standard AWS CLI profile)
#   - Environment variables: AWS_REGION, AWS_ACCESS_KEY_ID,
#                            AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN
#   - IAM role attached to your compute (EC2, ECS, Lambda, etc.)
#
# Required IAM permissions:
#   secretsmanager:GetSecretValue
#   secretsmanager:DescribeSecret
# =============================================================================

# --- Changelog ---------------------------------------------------------------
changeLogFile=db/changelog/db.changelog-main.xml

# --- Liquibase Secure license key (pulled from Secrets Manager) --------------
# AWS Secrets Manager secret name  : asmith-postgres
# Secret key                        : license_key
liquibase.licenseKey=aws-secrets,asmith-postgres,license_key

# --- PostgreSQL connection (all pulled from Secrets Manager) -----------------
# AWS Secrets Manager secret name  : asmith-postgres
# Secret keys                       : db_url | db_username | db_password
#
# Example secret value for db_url:
#   jdbc:postgresql://<your-host>:5432/<your-db-name>
url=aws-secrets,asmith-postgres,db_url
username=aws-secrets,asmith-postgres,db_username
password=aws-secrets,asmith-postgres,db_password

#-------------------------------------------------------------------------------
# Properties for Reports
#-------------------------------------------------------------------------------
liquibase.reports.enabled=true
liquibase.reports.path=reports